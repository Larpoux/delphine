<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cat Scratch Editor</title>
    <style>
      * {
        box-sizing: border-box;
      }
      #ir9k {
        margin-top: 0px;
        margin-right: 0px;
        margin-bottom: 0px;
        margin-left: 0px;
        color: rgb(42, 161, 182);
      }
      #button1 {
        color: rgb(255, 0, 0);
      }

      #buttonx {
        color: rgb(255, 0, 0);
        width: 100px;
        height: 100px;
      }

      #myvueplugin {
        color: rgb(255, 255, 0);
      }

      #mypanel {
        color: rgb(0, 255, 255);
        background-color: rgb(255, 255, 0);
        width: 800px;
        height: 800px;
      }
    </style>
  </head>
  <body
    data-props='{
    "onclick": "zaza_onclick",
    "name": "ZAZA"
  }'
    id="ir9k"
    data-component="TForm"
    data-name="ZAZA"
    data-oncreate="onMyCreate"
    data-onshown="onMyShown"
  >
    <button
      id="button1"
      data-component="TButton"
      data-name="button1"
      data-props='{
    
    "onclick": "button1_onclick",
    "caption": "Delphine button1 caption",
    "enabled": true,
    "name": "button1"
  }'
    >
      zaza
    </button>

    <button
      id="buttonx"
      data-component="TButton"
      data-caption="Delphine buttonx caption"
      data-name="buttonx"
    >
      Titi
    </button>

    <h1 id="igfu">Mon titreX</h1>

    <div
      id="myvueplugin"
      data-name="myvueplugin"
      data-component="TPluginHost"
      data-plugin="hello-vue"
      data-message="Bonjour depuis Delphine"
      data-props='{
    "message": "Hello depuis Delphine",
    "count": 3,
    "enabled": true
  }'
    ></div>

    <div id="mypanel" data-name="myPanel" data-component="TPanel">
      <button
        data-component="TButton"
        data-caption="sub-button1"
        data-name="sub-button1"
        data-onclick="subButton1_onclick"
      >
        Click Me!
      </button>
      <button data-component="TButton" data-caption="sub-button2" data-name="sub-button2">
        Click Me
      </button>
    </div>
    <script type="module" src="/src/zazaVue.js"></script>
  </body>
</html>
